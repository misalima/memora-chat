services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: memora-postgres
    environment:
      POSTGRES_USER: memora_user
      POSTGRES_PASSWORD: memora123
      POSTGRES_DB: memora_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora_user -d memora_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: