services:
  postgres:
    image: postgres:15-alpine
    container_name: memora-postgres
    environment:
      POSTGRES_USER: memora
      POSTGRES_PASSWORD: memora123
      POSTGRES_DB: memora_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: